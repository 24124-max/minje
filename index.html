
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Smart Home</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0b1120;
      font-family:Arial,sans-serif;
      color:white;
    }

    .container{
      width:420px;
      background:#111827;
      border:1px solid #334155;
      padding:28px;
      border-radius:8px;
      box-shadow:0 0 30px rgba(0,0,0,0.45);
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
    }

    .logo{
      font-size:26px;
      font-weight:bold;
      letter-spacing:1px;
      color:#38bdf8;
    }

    .status-online{
      padding:6px 12px;
      border-radius:4px;
      background:#16a34a;
      font-size:13px;
      font-weight:bold;
    }

    .section-title{
      margin-bottom:15px;
      font-size:15px;
      color:#94a3b8;
      letter-spacing:1px;
    }

    .sensor-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-bottom:22px;
    }

    .sensor-card{
      background:#1e293b;
      border:1px solid #334155;
      padding:18px;
      border-radius:6px;
    }

    .sensor-name{
      font-size:14px;
      color:#94a3b8;
      margin-bottom:10px;
    }

    .sensor-value{
      font-size:28px;
      font-weight:bold;
    }

    .ai-box{
      background:#0f172a;
      border:1px solid #334155;
      padding:18px;
      border-radius:6px;
      margin-bottom:18px;
    }

    .ai-title{
      color:#38bdf8;
      font-size:15px;
      margin-bottom:12px;
      font-weight:bold;
    }

    .ai-result{
      line-height:1.6;
      color:#e2e8f0;
      font-size:15px;
    }

    .button-group{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    button{
      height:52px;
      border:none;
      border-radius:5px;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      opacity:0.9;
      transform:translateY(-1px);
    }

    .analyze-btn{
      background:#38bdf8;
      color:white;
    }

    .voice-btn{
      background:#22c55e;
      color:white;
    }

    .login-btn{
      background:#f97316;
      color:white;
    }

    .footer{
      margin-top:20px;
      text-align:center;
      color:#64748b;
      font-size:12px;
      letter-spacing:1px;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="top-bar">
      <div class="logo">AI SMART HOME</div>
      <div class="status-online">ONLINE</div>
    </div>

    <div class="section-title">
      SENSOR STATUS
    </div>

    <div class="sensor-grid">

      <div class="sensor-card">
        <div class="sensor-name">TEMPERATURE</div>
        <div class="sensor-value" id="temp">28°C</div>
      </div>

      <div class="sensor-card">
        <div class="sensor-name">POWER</div>
        <div class="sensor-value" id="power">420W</div>
      </div>

      <div class="sensor-card">
        <div class="sensor-name">LIGHT</div>
        <div class="sensor-value">75%</div>
      </div>

      <div class="sensor-card">
        <div class="sensor-name">DOOR</div>
        <div class="sensor-value">OPEN</div>
      </div>

    </div>

    <div class="ai-box">

      <div class="ai-title">
        AI ANALYSIS
      </div>

      <div class="ai-result" id="result">
        시스템 분석 대기중...
      </div>

    </div>

    <div class="button-group">

      <button class="analyze-btn" onclick="analyzeData()">
        AI 분석 실행
      </button>

      <button class="voice-btn" onclick="speakResult()">
        음성 안내 실행
      </button>

      <button class="login-btn" onclick="login()">
        Firebase 로그인
      </button>

    </div>

    <div class="footer">
      Firebase · AI API · TTS SYSTEM
    </div>

  </div>

  <script>

    const result = document.getElementById("result");

    function analyzeData(){

      const temp = 28;
      const power = 420;

      let message = "";

      if(temp >= 30){
        message += "현재 실내 온도가 높습니다. 냉방 시스템 사용을 권장합니다. ";
      }else{
        message += "실내 온도 상태가 정상입니다. ";
      }

      if(power >= 400){
        message += "전력 사용량이 높습니다. 절전 모드 전환을 추천합니다.";
      }else{
        message += "전력 사용량이 정상 범위입니다.";
      }

      result.innerText = message;
    }

    function speakResult(){

      const text = result.innerText;

      const utterance = new SpeechSynthesisUtterance(text);

      utterance.lang = "ko-KR";

      speechSynthesis.speak(utterance);
    }

    function login(){
      alert("Firebase Authentication 연결 예정");
    }

  </script>

</body>
</html>
